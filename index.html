<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IND-CLUB | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-btn { background: #22c55e; color: white; transition: 0.3s; box-shadow: 0 0 15px rgba(34,197,94,0.4); }
        .glow-btn:hover { box-shadow: 0 0 25px rgba(34,197,94,0.8); transform: scale(1.02); }
    </style>
</head>
<body class="bg-white flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-sm p-8 text-center bg-white rounded-[40px] shadow-2xl border border-gray-50">
        <h1 class="text-4xl font-black mb-2 tracking-tighter">REGISTER</h1>
        <p class="text-gray-400 mb-8 font-medium">Join IND-CLUB Community</p>

        <div class="space-y-4 text-left">
            <input id="regEmail" type="email" placeholder="Email Address" class="w-full p-4 rounded-2xl bg-gray-50 border outline-none focus:border-green-400">
            <input id="regPass" type="password" placeholder="Create Password" class="w-full p-4 rounded-2xl bg-gray-50 border outline-none focus:border-green-400">
            <button onclick="handleRegister()" id="regBtn" class="w-full py-4 rounded-2xl font-bold text-lg glow-btn mt-4">CREATE ACCOUNT</button>
        </div>
        
        <p class="mt-6 text-sm">Already a member? <a href="login.html" class="text-green-500 font-bold">Login here</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let deviceId = localStorage.getItem('ind_club_device_id');
        if (!deviceId) {
            deviceId = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('ind_club_device_id', deviceId);
        }

        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const btn = document.getElementById('regBtn');

            if(!email || !pass) return alert("Details bhariye!");
            btn.disabled = true;
            btn.innerText = "WAIT...";

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'users/' + res.user.uid), {
                    email: email,
                    status: "active",
                    balance: 0,
                    registeredDevice: deviceId,
                    joinDate: new Date().toLocaleDateString()
                });
                alert("Account Created!");
                window.location.href = "dashboard.html";
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = "CREATE ACCOUNT";
            }
        };
    </script>
</body>
</html>
