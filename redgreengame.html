<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IND-CLUB | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bet-lock { filter: grayscale(1); pointer-events: none; opacity: 0.6; }
        .grid-box { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 10px; color: white; }
    </style>
</head>
<body class="bg-gray-100 pb-20">
    <!-- 18+ Notice -->
    <div id="agePop" class="fixed inset-0 z-[999] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white rounded-[30px] p-8 text-center max-w-xs">
            <h2 class="text-2xl font-black mb-2">18+ WARNING</h2>
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-6">Financial risk involved. Play at your own risk.</p>
            <button onclick="document.getElementById('agePop').remove()" class="w-full bg-red-500 text-white py-4 rounded-2xl font-black">ENTER GAME</button>
        </div>
    </div>

    <!-- Header -->
    <div class="bg-white p-5 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <h1 class="text-xl font-black italic">IND-CLUB</h1>
        <div class="bg-green-50 px-4 py-1 rounded-xl text-right border border-green-100">
            <p class="text-[8px] font-bold text-green-500 uppercase">Balance</p>
            <p class="text-lg font-black text-slate-800">₹<span id="balDisplay">0</span></p>
        </div>
    </div>

    <!-- Period & Timer -->
    <div class="p-4">
        <div class="bg-slate-900 rounded-[30px] p-6 text-white shadow-xl">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Period ID</p>
                    <p id="periodId" class="text-xl font-mono font-black text-yellow-400">---</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Timer</p>
                    <p id="timer" class="text-3xl font-black italic tracking-tighter">00:00</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Pattern -->
    <div class="px-4 mb-6">
        <div class="bg-white p-4 rounded-3xl border border-gray-200">
            <div id="patternGrid" class="grid grid-cols-7 gap-2"></div>
        </div>
    </div>

    <!-- Bet Buttons -->
    <div id="betBtns" class="grid grid-cols-2 gap-4 px-4">
        <button onclick="openBet('green')" class="bg-green-500 h-28 rounded-[35px] text-white font-black uppercase italic shadow-lg active:scale-95 transition">Green</button>
        <button onclick="openBet('red')" class="bg-red-500 h-28 rounded-[35px] text-white font-black uppercase italic shadow-lg active:scale-95 transition">Red</button>
    </div>

    <!-- History -->
    <div class="p-4 mt-4">
        <p class="text-[10px] font-black text-gray-400 uppercase mb-3 ml-2">Game History</p>
        <div class="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-sm">
            <table class="w-full text-left text-xs">
                <thead class="bg-gray-50 font-bold text-gray-400 uppercase">
                    <tr><th class="p-4">Period</th><th class="p-4">Result</th><th class="p-4 text-right">Color</th></tr>
                </thead>
                <tbody id="gameHistory"></tbody>
            </table>
        </div>
    </div>

    <!-- Bet Modal -->
    <div id="betModal" class="fixed inset-0 z-[100] hidden bg-black/50 flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 pb-12 shadow-2xl">
            <h3 class="text-xl font-black mb-4">Invest on <span id="selCol" class="uppercase"></span></h3>
            <input type="number" id="betAmt" value="10" class="w-full p-4 bg-gray-100 rounded-2xl font-black text-2xl outline-none mb-6">
            <button onclick="confirmBet()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase">Confirm Bet</button>
            <button onclick="document.getElementById('betModal').classList.add('hidden')" class="w-full p-3 text-gray-400 text-[10px] font-bold mt-2">CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, runTransaction, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

       const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };


        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myUid = "User_" + Math.floor(Math.random()*9999);
        let selectedColor = "";

        // Online Status
        const statusRef = ref(db, `online/${myUid}`);
        set(statusRef, { active: true, time: Date.now() });
        onDisconnect(statusRef).remove();

        // Sync Timer & Period
        onValue(ref(db, 'gameState'), snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('timer').innerText = `00:${data.timer < 10 ? '0'+data.timer : data.timer}`;
                document.getElementById('periodId').innerText = data.period;
                if(data.timer <= 5) document.getElementById('betBtns').classList.add('bet-lock');
                else document.getElementById('betBtns').classList.remove('bet-lock');
            }
        });

        // History
        onValue(ref(db, 'history'), snap => {
            const grid = document.getElementById('patternGrid');
            const table = document.getElementById('gameHistory');
            grid.innerHTML = ""; table.innerHTML = "";
            let dataArr = [];
            snap.forEach(c => dataArr.push(c.val()));
            dataArr.reverse();
            dataArr.slice(0,21).forEach(i => {
                grid.innerHTML += `<div class="grid-box" style="background:${i.result}">${i.result[0].toUpperCase()}</div>`;
            });
            dataArr.forEach(i => {
                table.innerHTML += `<tr class="border-t"><td class="p-4 font-mono font-bold">${i.period}</td><td class="p-4 font-black uppercase ${i.result === 'red' ? 'text-red-500' : 'text-green-500'}">${i.result}</td><td class="p-4 text-right"><span class="inline-block w-3 h-3 rounded-full" style="background:${i.result}"></span></td></tr>`;
            });
        });

        // Balance logic
        onValue(ref(db, `users/${myUid}/balance`), s => {
            let bal = s.val();
            if(bal === null) { set(ref(db, `users/${myUid}/balance`), 500); bal = 500; }
            document.getElementById('balDisplay').innerText = bal;
        });

        window.openBet = (c) => {
            selectedColor = c;
            document.getElementById('selCol').innerText = c;
            document.getElementById('betModal').classList.remove('hidden');
        };

        window.confirmBet = async () => {
            const amt = parseInt(document.getElementById('betAmt').value);
            const balRef = ref(db, `users/${myUid}/balance`);
            await runTransaction(balRef, (curr) => {
                if(curr >= amt) return curr - amt;
                else { alert("Insufficient Balance!"); return; }
            });
            push(ref(db, 'currentBets'), { uid: myUid, amount: amt, choice: selectedColor });
            alert("Bet Placed!");
            document.getElementById('betModal').classList.add('hidden');
        };
    </script>
</body>
</html>
