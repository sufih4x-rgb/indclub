<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IND-CLUB | Pro Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-box { width: 35px; height: 35px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 10px; color: white; }
        .bet-lock { filter: grayscale(1); pointer-events: none; }
        .popup-blur { backdrop-filter: blur(8px); background: rgba(0,0,0,0.7); }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div id="agePopup" class="fixed inset-0 z-[5000] popup-blur flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-8 max-w-xs w-full text-center relative shadow-2xl">
            <button onclick="document.getElementById('agePopup').remove()" class="absolute top-5 right-6 font-bold text-gray-300 text-xl">✕</button>
            <div class="text-6xl mb-4">🔞</div>
            <h2 class="text-2xl font-black italic mb-2">ADULT GAME</h2>
            <p class="text-[10px] text-gray-400 font-bold uppercase leading-relaxed">This game involves financial risk. Proceed only if you are 18+.</p>
            <button onclick="document.getElementById('agePopup').remove()" class="w-full bg-red-500 text-white p-4 rounded-2xl mt-6 font-black uppercase shadow-lg shadow-red-200">I Understand</button>
        </div>
    </div>

    <div class="bg-white p-6 shadow-sm sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black italic">IND-CLUB</h1>
            <div class="text-right">
                <p class="text-[9px] font-bold text-gray-400 uppercase">My Balance</p>
                <p class="text-xl font-black text-green-600">₹<span id="bal">0</span></p>
            </div>
        </div>
        <div class="flex justify-between items-end bg-slate-900 p-4 rounded-2xl text-white">
            <div>
                <p class="text-[9px] text-slate-400 font-bold uppercase">Period ID</p>
                <p id="periodId" class="text-lg font-mono font-black tracking-tighter text-yellow-400">2026040001</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-slate-400 font-bold uppercase">Count Down</p>
                <p id="timer" class="text-2xl font-black italic">00:60</p>
            </div>
        </div>
    </div>

    <div class="p-4">
        <div class="bg-white p-4 rounded-[30px] border">
            <p class="text-[9px] font-black text-gray-400 mb-3 text-center uppercase tracking-widest">Trend Pattern</p>
            <div id="patternGrid" class="grid grid-cols-7 gap-2">
                </div>
        </div>
    </div>

    <div id="betBtns" class="grid grid-cols-2 gap-4 px-4 mb-8">
        <button onclick="openBet('green')" class="bg-green-500 p-8 rounded-[35px] shadow-lg shadow-green-100 flex flex-col items-center">
            <span class="text-3xl mb-1">🍀</span>
            <span class="text-white font-black uppercase italic">Green</span>
        </button>
        <button onclick="openBet('red')" class="bg-red-500 p-8 rounded-[35px] shadow-lg shadow-red-100 flex flex-col items-center">
            <span class="text-3xl mb-1">🔥</span>
            <span class="text-white font-black uppercase italic">Red</span>
        </button>
    </div>

    <div class="px-4">
        <h3 class="text-xs font-black text-gray-400 uppercase mb-4 ml-2">Game Record History</h3>
        <div class="bg-white rounded-[30px] border overflow-hidden">
            <table class="w-full text-left text-xs">
                <thead class="bg-gray-50 text-gray-400">
                    <tr>
                        <th class="p-4">Period</th>
                        <th class="p-4">Result</th>
                        <th class="p-4 text-right">Color</th>
                    </tr>
                </thead>
                <tbody id="gameHistory">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="betModal" class="fixed inset-0 z-[6000] hidden popup-blur flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 animate-bounce-short">
            <h3 class="text-xl font-black italic uppercase mb-4">Invest on <span id="selCol"></span></h3>
            <input type="number" id="betAmt" value="10" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-black text-xl mb-4">
            <button onclick="confirmBet()" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase italic">Confirm Investment</button>
            <button onclick="document.getElementById('betModal').classList.add('hidden')" class="w-full p-4 text-gray-400 text-[10px] font-bold uppercase mt-2">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, push, runTransaction, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myBal = 0;
        let selected = '';
        let myUid = "User_" + Math.floor(Math.random()*9999); // Simulating Auth for Demo

        // --- Timer & Period Logic ---
        onValue(ref(db, 'gameState'), snap => {
            const data = snap.val();
            document.getElementById('timer').innerText = `00:${data.timer < 10 ? '0'+data.timer : data.timer}`;
            document.getElementById('periodId').innerText = data.period;

            if(data.timer <= 5) {
                document.getElementById('betBtns').classList.add('bet-lock');
            } else {
                document.getElementById('betBtns').classList.remove('bet-lock');
            }
        });

        // --- Trend Pattern & History ---
        onValue(ref(db, 'history'), snap => {
            const grid = document.getElementById('patternGrid');
            const historyTable = document.getElementById('gameHistory');
            grid.innerHTML = "";
            historyTable.innerHTML = "";
            
            let dataArr = [];
            snap.forEach(c => dataArr.push(c.val()));
            dataArr.reverse();

            // Row Pattern (Top 21)
            dataArr.slice(0, 21).forEach(item => {
                grid.innerHTML += `<div class="grid-box" style="background:${item.result}">${item.result === 'red' ? 'R' : 'G'}</div>`;
            });

            // Table History
            dataArr.forEach(item => {
                historyTable.innerHTML += `
                    <tr class="border-t">
                        <td class="p-4 font-mono font-bold">${item.period}</td>
                        <td class="p-4 uppercase font-black ${item.result === 'red' ? 'text-red-500' : 'text-green-500'}">${item.result}</td>
                        <td class="p-4 text-right"><span class="inline-block w-3 h-3 rounded-full" style="background:${item.result}"></span></td>
                    </tr>`;
            });
        });

        // --- Betting ---
        window.openBet = (c) => {
            selected = c;
            document.getElementById('selCol').innerText = c;
            document.getElementById('betModal').classList.remove('hidden');
        };

        window.confirmBet = () => {
            const amt = parseInt(document.getElementById('betAmt').value);
            if(amt < 1 || amt > 1000) return alert("₹1 to ₹1000 limit");
            
            // Push to current bets for Admin
            push(ref(db, 'currentBets'), {
                uid: myUid,
                amount: amt,
                choice: selected
            });
            alert("Bet Placed!");
            document.getElementById('betModal').classList.add('hidden');
        };

        // Simulating Balance
        onValue(ref(db, `users/${myUid}/balance`), s => {
            myBal = s.val() || 500;
            document.getElementById('bal').innerText = myBal;
        });
    </script>
</body>
</html>
