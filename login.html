<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IND-CLUB | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-btn { background: #22c55e; color: white; transition: 0.3s; box-shadow: 0 0 15px rgba(34,197,94,0.4); }
    </style>
</head>
<body class="bg-white flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-sm p-8 text-center bg-white rounded-[40px] shadow-2xl border border-gray-50">
        <h1 class="text-4xl font-black mb-2 tracking-tighter">LOGIN</h1>
        <p class="text-gray-400 mb-8 font-medium">Secure Access Only</p>

        <div class="space-y-4">
            <input id="logEmail" type="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-gray-50 border outline-none focus:border-green-400">
            <input id="logPass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border outline-none focus:border-green-400">
            <button onclick="handleLogin()" id="logBtn" class="w-full py-4 rounded-2xl font-bold text-lg glow-btn mt-2">ACCESS ACCOUNT</button>
        </div>
        
        <p class="mt-6 text-sm">New member? <a href="index.html" class="text-green-500 font-bold">Register Now</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const currentDeviceId = localStorage.getItem('ind_club_device_id');

        window.handleLogin = async () => {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;
            const btn = document.getElementById('logBtn');

            btn.disabled = true;
            btn.innerText = "VERIFYING...";

            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                const snap = await get(ref(db, 'users/' + res.user.uid));
                
                if (snap.exists()) {
                    const data = snap.val();
                    
                    if (data.status === 'banned') {
                        alert("🚫 Aap BANNED hain!");
                        auth.signOut();
                    } else if (data.registeredDevice && data.registeredDevice !== currentDeviceId) {
                        alert("❌ Device Mismatch! Use your original phone.");
                        auth.signOut();
                    } else {
                        window.location.href = "dashboard.html";
                    }
                }
            } catch (err) {
                alert("Galt Password ya Email!");
            }
            btn.disabled = false;
            btn.innerText = "ACCESS ACCOUNT";
        };
    </script>
</body>
</html>
