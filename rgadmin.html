<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Tiranga Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #0f172a; --card: #1e293b; --white: #ffffff; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--white); margin: 0; padding: 20px; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #334155; }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .control-card { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        
        .bet-monitor { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #334155; min-height: 400px; }
        .bet-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px; border-bottom: 1px solid #334155; align-items: center; }
        
        .btn { padding: 15px 30px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-red { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-auto { background: #64748b; color: white; }
        .active-mode { border: 4px solid var(--white); transform: scale(1.05); }

        .stat-box { display: flex; justify-content: space-around; margin-top: 15px; }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 12px; color: #94a3b8; }
        .stat-item b { font-size: 20px; }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        .badge-red { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-green { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    </style>
</head>
<body>

<div class="admin-header">
    <div>
        <h2 style="margin:0;">Tiranga Controller</h2>
        <p style="color:#94a3b8; margin:5px 0 0;">Period ID: <span id="currentPeriod">---</span></p>
    </div>
    <div style="text-align: right;">
        <div style="color:var(--danger); font-weight:900; font-size:24px;" id="adminClock">00:00</div>
        <div id="modeStatus" class="badge" style="background:var(--primary)">MODE: AUTO</div>
    </div>
</div>

<div class="control-grid">
    <div class="control-card">
        <h3>Result Control</h3>
        <p style="font-size:12px; color:#94a3b8;">Force next winning color</p>
        <button class="btn btn-red" id="forceRED" onclick="setMode('RED')">FORCE RED</button>
        <button class="btn btn-green" id="forceGREEN" onclick="setMode('GREEN')">FORCE GREEN</button>
        <button class="btn btn-auto active-mode" id="forceAUTO" onclick="setMode('AUTO')">AUTO (SYSTEM)</button>
    </div>

    <div class="control-card">
        <h3>Live Betting Stats</h3>
        <div class="stat-box">
            <div class="stat-item">
                <span>Total Red Bet</span>
                <b id="totalRedAmt" style="color:var(--danger);">₹0</b>
            </div>
            <div class="stat-item">
                <span>Total Green Bet</span>
                <b id="totalGreenAmt" style="color:var(--success);">₹0</b>
            </div>
        </div>
        <p style="margin-top:20px; font-size:11px; color:#94a3b8;">Tip: High investment side should lose for profit.</p>
    </div>
</div>

<div class="bet-monitor">
    <h3 style="padding: 0 20px;">Live User Bets</h3>
    <div class="bet-row" style="color:#94a3b8; font-weight:800; border-bottom: 2px solid #334155;">
        <span>User ID</span>
        <span>Selection</span>
        <span>Amount</span>
    </div>
    <div id="betList">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
  authDomain: "ind-club-v1.firebaseapp.com",
  databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
  projectId: "ind-club-v1",
  storageBucket: "ind-club-v1.appspot.com",
  messagingSenderId: "1043970059809",
  appId: "1:1043970059809:web:f730b857ca3a76c061fd60",
  measurementId: "G-23MD02RGN3"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let periodId = "";

    // 1. Clock & Period Logic (Sync with User)
    setInterval(() => {
        const now = new Date();
        const totalSec = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        const rem = 60 - (totalSec % 60);
        const pId = now.toISOString().slice(0,10).replace(/-/g,'') + Math.floor(totalSec / 60);
        
        if(periodId !== pId) {
            periodId = pId;
            document.getElementById('currentPeriod').innerText = periodId;
            listenToBets(periodId); // New period start, listen to new bets
        }
        const s = rem % 60;
        document.getElementById('adminClock').innerText = `00:${s < 10 ? '0'+s : s}`;
    }, 1000);

    // 2. Result Control Logic
    window.setMode = (mode) => {
        set(ref(db, 'admin_control'), mode);
        
        // UI Button highlight
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active-mode'));
        if(mode === 'RED') document.getElementById('forceRED').classList.add('active-mode');
        if(mode === 'GREEN') document.getElementById('forceGREEN').classList.add('active-mode');
        if(mode === 'AUTO') document.getElementById('forceAUTO').classList.add('active-mode');
        
        document.getElementById('modeStatus').innerText = "MODE: " + mode;
    };

    // 3. Listen to Live Bets for Current Period
    function listenToBets(pId) {
        onValue(ref(db, `global_bets/${pId}`), snap => {
            const list = document.getElementById('betList');
            let redTotal = 0;
            let greenTotal = 0;
            let html = "";

            if(snap.exists()) {
                snap.forEach(child => {
                    const bet = child.val();
                    const userId = child.key.substring(0, 6) + "...";
                    
                    if(bet.choice === 'RED') redTotal += bet.amount;
                    else greenTotal += bet.amount;

                    html += `
                    <div class="bet-row">
                        <span>${userId}</span>
                        <span><span class="badge ${bet.choice === 'RED' ? 'badge-red' : 'badge-green'}">${bet.choice}</span></span>
                        <b style="color:var(--white)">₹${bet.amount}</b>
                    </div>`;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = `<p style="text-align:center; color:#64748b; padding:20px;">Waiting for bets...</p>`;
            }

            document.getElementById('totalRedAmt').innerText = "₹" + redTotal;
            document.getElementById('totalGreenAmt').innerText = "₹" + greenTotal;
        });
    }

    // Load initial mode
    get(ref(db, 'admin_control')).then(s => {
        if(s.exists()) setMode(s.val());
    });

</script>
</body>
</html>
