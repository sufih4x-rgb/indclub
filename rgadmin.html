<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin | IND-CLUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic">IND-CLUB ADMIN</h1>
            <div class="text-right">
                <p id="timer" class="text-5xl font-mono text-yellow-400">00:00</p>
                <p id="period" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-2">---</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800 p-6 rounded-3xl text-center border-2 border-green-500/30">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-2">Total Green</p>
                <h2 id="gTotal" class="text-3xl font-black text-green-500">₹0</h2>
            </div>
            <div class="bg-slate-800 p-6 rounded-3xl text-center border-2 border-red-500/30">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-2">Total Red</p>
                <h2 id="rTotal" class="text-3xl font-black text-red-500">₹0</h2>
            </div>
            <div class="bg-slate-800 p-6 rounded-3xl text-center border-2 border-blue-500/30">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-2">Online Users</p>
                <h2 id="onlineCount" class="text-3xl font-black text-blue-500">0</h2>
            </div>
        </div>

        <!-- Result Controls -->
        <div class="bg-slate-800 p-8 rounded-[40px] mb-10">
            <h3 class="text-center text-xs font-bold text-slate-500 uppercase mb-6 tracking-widest">Result Control</h3>
            <div class="grid grid-cols-3 gap-4">
                <button onclick="setMode('green')" class="bg-green-600 p-6 rounded-3xl font-black shadow-lg shadow-green-900/20 active:scale-95 transition">FORCE GREEN</button>
                <button onclick="setMode('ai')" id="aiBtn" class="bg-blue-600 p-6 rounded-3xl font-black border-4 border-white shadow-lg active:scale-95 transition">AI PROFIT MODE</button>
                <button onclick="setMode('red')" class="bg-red-600 p-6 rounded-3xl font-black shadow-lg shadow-red-900/20 active:scale-95 transition">FORCE RED</button>
            </div>
            <p id="modeStatus" class="text-center text-[10px] text-slate-400 mt-4 uppercase font-bold">Current Mode: AI (Profit Guaranteed)</p>
        </div>

        <!-- Live Bets -->
        <div class="bg-slate-800 rounded-[30px] p-6 overflow-hidden">
            <p class="text-xs font-black text-slate-500 uppercase mb-4 tracking-widest">Live User Bets</p>
            <div id="liveBets" class="space-y-3 max-h-60 overflow-y-auto"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, push, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };

        let time = 60, period = 20260430001, mode = 'ai', gTotal = 0, rTotal = 0;
        let betList = [];

        // Main Timer Loop
        setInterval(() => {
            time--;
            if(time < 0) { time = 60; period++; processGame(); }
            update(ref(db, 'gameState'), { timer: time, period: period });
            document.getElementById('timer').innerText = `00:${time < 10 ? '0'+time : time}`;
            document.getElementById('period').innerText = "Period ID: " + period;
        }, 1000);

        async function processGame() {
            let winColor = '';
            // Admin Profit Logic
            if(mode === 'ai') winColor = rTotal > gTotal ? 'green' : 'red';
            else winColor = mode;

            // Save to History
            push(ref(db, 'history'), { period: period - 1, result: winColor });

            // Settlement: 1.9x payout (Admin retains 0.1 profit)
            betList.forEach(bet => {
                if(bet.choice === winColor) {
                    const winAmt = Math.floor(bet.amount * 1.9); // Profit controlled
                    runTransaction(ref(db, `users/${bet.uid}/balance`), curr => (curr || 0) + winAmt);
                }
            });

            // Cleanup
            remove(ref(db, 'currentBets'));
            mode = 'ai'; // Reset to AI for next round
            updateStatus();
        }

        window.setMode = (m) => { mode = m; updateStatus(); };

        function updateStatus() {
            document.getElementById('modeStatus').innerText = "Current Mode: " + (mode === 'ai' ? "AI (Profit Guaranteed)" : mode.toUpperCase());
            document.getElementById('aiBtn').classList.toggle('border-white', mode === 'ai');
        }

        onValue(ref(db, 'currentBets'), snap => {
            gTotal = 0; rTotal = 0; betList = [];
            const list = document.getElementById('liveBets');
            list.innerHTML = "";
            snap.forEach(c => {
                const b = c.val();
                betList.push(b);
                if(b.choice === 'red') rTotal += b.amount; else gTotal += b.amount;
                list.innerHTML += `<div class="bg-slate-700/50 p-3 rounded-xl flex justify-between text-xs"><span>${b.uid}</span><span class="${b.choice === 'red' ? 'text-red-400' : 'text-green-400'} font-bold">₹${b.amount} on ${b.choice.toUpperCase()}</span></div>`;
            });
            document.getElementById('gTotal').innerText = "₹" + gTotal;
            document.getElementById('rTotal').innerText = "₹" + rTotal;
        });

        onValue(ref(db, 'online'), s => { document.getElementById('onlineCount').innerText = s.size || 0; });
    </script>
</body>
</html>
