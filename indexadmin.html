<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IND-CLUB | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .selected-chat { border-left: 5px solid #22c55e; background-color: #f0fdf4; }
    </style>
</head>
<body class="bg-white min-h-screen p-4 md:p-10 text-gray-800">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter">MASTER ADMIN</h1>
                <p class="text-gray-400 font-medium">Control users, devices, and live support</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-gray-50 border p-5 px-8 rounded-3xl text-center shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Users</p>
                    <p id="totalUsers" class="text-2xl font-black">0</p>
                </div>
                <div class="bg-gray-50 border p-5 px-8 rounded-3xl text-center shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Live Chats</p>
                    <p id="activeChats" class="text-2xl font-black text-green-600">0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 bg-white rounded-3xl border border-gray-100 shadow-2xl p-6">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="w-2 h-6 bg-green-500 rounded-full"></span> Registered Users
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-400 text-xs uppercase border-b">
                                <th class="pb-4">User Details</th>
                                <th class="pb-4 text-center">Account Status</th>
                                <th class="pb-4 text-right">Settings</th>
                            </tr>
                        </thead>
                        <tbody id="userTable" class="divide-y divide-gray-50">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-gray-100 shadow-2xl flex flex-col h-[650px] overflow-hidden">
                <div class="p-6 border-b bg-gray-50">
                    <h2 class="text-lg font-bold">Live Support Inbox</h2>
                </div>
                
                <div id="inbox" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
                    <p class="text-center text-gray-400 text-sm mt-10">Waiting for messages...</p>
                </div>

                <div id="replyArea" class="p-5 bg-white border-t hidden">
                    <p id="chattingWith" class="text-[10px] font-black text-green-600 mb-2 uppercase"></p>
                    <div class="flex gap-2">
                        <input id="replyInput" type="text" placeholder="Type your reply..." 
                            class="flex-1 bg-gray-100 p-3 rounded-2xl outline-none border focus:border-green-400 transition-all">
                        <button onclick="sendReply()" class="bg-green-500 text-white px-6 rounded-2xl font-bold glow-green">REPLY</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selectedDevice = "";

        // --- 1. Load User List & Stats ---
        onValue(ref(db, 'users'), (snapshot) => {
            const table = document.getElementById('userTable');
            let count = 0;
            table.innerHTML = "";

            snapshot.forEach(child => {
                const uid = child.key;
                const u = child.val();
                count++;

                const statusStyle = u.status === 'active' ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50';

                table.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="py-5">
                            <p class="font-black text-sm">${u.email}</p>
                            <p class="text-[10px] text-gray-400 font-mono tracking-tight">${u.registeredDevice || 'NOT REGISTERED'}</p>
                        </td>
                        <td class="text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${statusStyle}">${u.status}</span>
                        </td>
                        <td class="text-right space-x-1">
                            <button onclick="updateStatus('${uid}', 'active')" class="text-[10px] font-bold text-green-500 hover:bg-green-50 px-2 py-1 rounded">UNBAN</button>
                            <button onclick="updateStatus('${uid}', 'banned')" class="text-[10px] font-bold text-red-400 hover:bg-red-50 px-2 py-1 rounded">BAN</button>
                            <button onclick="resetDevice('${uid}')" class="bg-black text-white px-3 py-1 rounded-xl text-[10px] font-bold ml-2">RESET DEVICE</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('totalUsers').innerText = count;
        });

        // --- 2. Action Functions ---
        window.updateStatus = (uid, s) => update(ref(db, `users/${uid}`), { status: s });
        window.resetDevice = (uid) => {
            if(confirm("Force user to re-register their device?")) {
                update(ref(db, `users/${uid}`), { registeredDevice: null });
                alert("Device ID Reset Successfully!");
            }
        };

        // --- 3. Live Chat Management ---
        onValue(ref(db, 'chats'), (snapshot) => {
            const inbox = document.getElementById('inbox');
            let chatCount = 0;
            inbox.innerHTML = "";
            
            snapshot.forEach(child => {
                chatCount++;
                const devID = child.key;
                const messages = Object.values(child.val());
                const last = messages[messages.length - 1];

                const chatItem = document.createElement('div');
                chatItem.className = `p-4 rounded-2xl cursor-pointer border transition-all hover:bg-white mb-2 ${selectedDevice === devID ? 'selected-chat shadow-md bg-white' : 'bg-white/50'}`;
                chatItem.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-[10px] font-black text-gray-400 uppercase">${devID}</p>
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    </div>
                    <p class="text-sm truncate font-medium text-gray-700">${last.message}</p>
                `;
                chatItem.onclick = () => {
                    selectedDevice = devID;
                    document.getElementById('replyArea').classList.remove('hidden');
                    document.getElementById('chattingWith').innerText = "Target: " + devID;
                    // Refresh highlighting
                    document.querySelectorAll('#inbox div').forEach(el => el.classList.remove('selected-chat'));
                    chatItem.classList.add('selected-chat');
                };
                inbox.appendChild(chatItem);
            });
            document.getElementById('activeChats').innerText = chatCount;
        });

        // --- 4. Send Reply to User ---
        window.sendReply = () => {
            const input = document.getElementById('replyInput');
            if(!input.value || !selectedDevice) return;

            push(ref(db, `chats/${selectedDevice}`), {
                sender: 'admin',
                message: input.value,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

    </script>
</body>
</html>
