<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IND-CLUB | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-black mb-8 tracking-tighter">ADMIN DATABASE</h1>
        
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border">
            <table class="w-full text-left">
                <thead class="bg-gray-100 text-xs font-bold uppercase">
                    <tr>
                        <th class="p-5">User Email</th>
                        <th class="p-5">Device ID</th>
                        <th class="p-5">Status</th>
                        <th class="p-5 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="userList" class="divide-y divide-gray-100">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'users'), (snapshot) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const uid = child.key;
                const u = child.val();
                
                list.innerHTML += `
                    <tr>
                        <td class="p-5 font-bold text-sm">${u.email}</td>
                        <td class="p-5 font-mono text-xs text-gray-400">${u.registeredDevice || 'NONE'}</td>
                        <td class="p-5">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black ${u.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                ${u.status.toUpperCase()}
                            </span>
                        </td>
                        <td class="p-5 text-right space-x-2">
                            <button onclick="setStatus('${uid}', 'active')" class="text-xs font-bold text-green-500">UNBAN</button>
                            <button onclick="setStatus('${uid}', 'banned')" class="text-xs font-bold text-red-400">BAN</button>
                            <button onclick="resetDevice('${uid}')" class="bg-black text-white px-3 py-1 rounded-lg text-xs font-bold">RESET DEVICE</button>
                        </td>
                    </tr>
                `;
            });
        });

        window.setStatus = (id, s) => update(ref(db, 'users/' + id), { status: s });
        window.resetDevice = (id) => {
            if(confirm("Reset Device Lock?")) {
                update(ref(db, 'users/' + id), { registeredDevice: null });
            }
        };
    </script>
</body>
</html>
