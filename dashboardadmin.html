<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">

    <div class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-4xl font-black italic uppercase tracking-tighter text-slate-800">Admin Control Center</h1>

        <div class="bg-white p-8 rounded-[35px] shadow-xl border">
            <h3 class="text-xs font-black text-gray-400 mb-4 uppercase">Add New Slider Image (Auto-Compress)</h3>
            <div class="space-y-4">
                <div class="relative">
                    <input type="file" id="upFile" accept="image/*" class="w-full p-4 border-2 border-dashed rounded-2xl cursor-pointer hover:bg-slate-50 transition">
                </div>
                <input id="upLink" type="text" placeholder="Redirect URL (e.g. game.html)" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-black">
                
                <button onclick="addSlide()" id="upBtn" class="w-full bg-black text-white p-5 rounded-2xl font-black flex justify-center items-center gap-2 active:scale-95 transition disabled:opacity-50">
                    <span id="btnText">UPLOAD & ADD SLIDE</span>
                </button>
            </div>
            
            <h3 class="text-xs font-black text-gray-400 mt-8 mb-4 uppercase">Current Sliders (Delete)</h3>
            <div id="slideManager" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>

        <div class="bg-white p-8 rounded-[35px] shadow-xl border">
            <h3 class="text-xs font-black text-gray-400 mb-4 uppercase">Add New Button (Grid or Sidebar)</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <input id="bName" type="text" placeholder="Button Name" class="p-4 bg-gray-50 border rounded-2xl outline-none">
                <input id="bUrl" type="text" placeholder="Link (e.g. faq.html)" class="p-4 bg-gray-50 border rounded-2xl outline-none">
                <select id="bType" class="p-4 bg-gray-50 border rounded-2xl font-bold outline-none">
                    <option value="miniButtons">Grid Button (Dashboard)</option>
                    <option value="sidebarLinks">Sidebar Link</option>
                </select>
            </div>
            <button onclick="addButton()" class="w-full bg-green-500 text-white p-4 rounded-2xl font-black active:scale-95 transition">ADD BUTTON NOW</button>

            <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h4 class="text-[10px] font-bold text-blue-500 uppercase mb-4 tracking-widest">Active Sidebar Links</h4>
                    <div id="sidebarList" class="space-y-2"></div>
                </div>
                <div>
                    <h4 class="text-[10px] font-bold text-green-500 uppercase mb-4 tracking-widest">Active Grid Buttons</h4>
                    <div id="gridList" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // --- IMAGE COMPRESSION LOGIC (FAST UPLOAD) ---
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1200; // Optimal for Sliders
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7); // 70% Quality = Super Fast
                    };
                };
            });
        }

        // --- SLIDER FUNCTIONS ---
        window.addSlide = async () => {
            const file = document.getElementById('upFile').files[0];
            const link = document.getElementById('upLink').value;
            const btn = document.getElementById('upBtn');
            const btnText = document.getElementById('btnText');

            if(!file) return alert("Pehle Photo Select Karein!");

            // Start Loading Visuals
            btn.disabled = true;
            btnText.innerHTML = "COMPRESSING & UPLOADING...";

            try {
                // 1. Compress the image first
                const smallFile = await compressImage(file);

                // 2. Upload to Storage
                const path = sRef(storage, 'sliders/' + Date.now());
                await uploadBytes(path, smallFile);
                const url = await getDownloadURL(path);

                // 3. Save to Database
                await push(ref(db, 'adminSettings/sliders'), { img: url, link: link || "#" });
                
                alert("Slide Successully Added!");
                document.getElementById('upFile').value = "";
                document.getElementById('upLink').value = "";
            } catch (err) {
                alert("Upload failed: " + err.message);
            } finally {
                btn.disabled = false;
                btnText.innerHTML = "UPLOAD & ADD SLIDE";
            }
        };

        // Real-time Slider List
        onValue(ref(db, 'adminSettings/sliders'), (snap) => {
            const manager = document.getElementById('slideManager');
            manager.innerHTML = "";
            snap.forEach(child => {
                manager.innerHTML += `
                    <div class="relative rounded-xl overflow-hidden border-2 border-white shadow-md p-1 bg-white group">
                        <img src="${child.val().img}" class="w-full h-24 object-cover rounded-lg">
                        <button onclick="deleteItem('sliders/${child.key}')" class="absolute top-2 right-2 bg-red-500 text-white p-1 px-3 rounded-lg text-[10px] font-black shadow-lg">DELETE</button>
                    </div>`;
            });
        });

        // --- BUTTON & SIDEBAR FUNCTIONS ---
        window.addButton = () => {
            const name = document.getElementById('bName').value;
            const url = document.getElementById('bUrl').value;
            const type = document.getElementById('bType').value;
            if(!name || !url) return alert("Pura naam aur link likhen!");

            push(ref(db, `adminSettings/${type}`), { name, url });
            alert("Success!");
            document.getElementById('bName').value = "";
            document.getElementById('bUrl').value = "";
        };

        // Sync Sidebar & Grid Lists
        onValue(ref(db, 'adminSettings'), (snap) => {
            const data = snap.val();
            const sList = document.getElementById('sidebarList');
            const gList = document.getElementById('gridList');
            sList.innerHTML = ""; gList.innerHTML = "";

            if(data?.sidebarLinks) {
                Object.keys(data.sidebarLinks).forEach(key => {
                    sList.innerHTML += renderItem(key, data.sidebarLinks[key], 'sidebarLinks');
                });
            }
            if(data?.miniButtons) {
                Object.keys(data.miniButtons).forEach(key => {
                    gList.innerHTML += renderItem(key, data.miniButtons[key], 'miniButtons');
                });
            }
        });

        function renderItem(key, item, path) {
            return `
                <div class="flex justify-between items-center bg-white p-3 rounded-2xl border shadow-sm mb-2 hover:border-slate-300 transition">
                    <div class="truncate pr-4">
                        <p class="text-[11px] font-black uppercase text-slate-700 truncate">${item.name}</p>
                        <p class="text-[9px] text-gray-400 truncate">${item.url}</p>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="editItem('${path}/${key}', '${item.name}', '${item.url}')" class="bg-blue-50 text-blue-600 p-2 px-3 rounded-xl text-[9px] font-black">EDIT</button>
                        <button onclick="deleteItem('${path}/${key}')" class="bg-red-50 text-red-600 p-2 px-3 rounded-xl text-[9px] font-black">DEL</button>
                    </div>
                </div>`;
        }

        window.deleteItem = (fullPath) => {
            if(confirm("Confirm Delete?")) remove(ref(db, 'adminSettings/' + fullPath));
        };

        window.editItem = (fullPath, oldName, oldUrl) => {
            const newName = prompt("Naya Name:", oldName);
            const newUrl = prompt("Naya URL/Link:", oldUrl);
            if(newName && newUrl) {
                update(ref(db, 'adminSettings/' + fullPath), { name: newName, url: newUrl });
            }
        };
    </script>
</body>
</html>
