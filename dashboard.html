<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IND-CLUB | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #ffffff; --text: #000000; --card: #f8fafc; }
        .dark-mode { --bg: #0f172a; --text: #ffffff; --card: #1e293b; }
        body { background-color: var(--bg); color: var(--text); transition: 0.3s; font-family: sans-serif; overflow-x: hidden; }
        .card-ui { background-color: var(--card); border: 1px solid rgba(0,0,0,0.1); }
        .glow-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen flex">

    <div id="sidebar" class="sidebar fixed left-0 top-0 h-full w-72 bg-white dark:bg-slate-900 border-r shadow-2xl z-50 -translate-x-full lg:translate-x-0 p-6">
        <h2 class="text-3xl font-black text-green-500 mb-8 italic">IND-CLUB</h2>
        <nav class="space-y-2" id="sidebarLinks"></nav>
        <button onclick="toggleSidebar()" class="lg:hidden mt-10 w-full p-4 bg-gray-100 rounded-2xl font-bold">CLOSE</button>
    </div>

    <div class="flex-1 lg:ml-72 p-4 md:p-10">
        <div class="flex justify-between items-center mb-6">
            <button onclick="toggleSidebar()" class="lg:hidden p-3 card-ui rounded-2xl">☰</button>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Available Balance</p>
                <h2 class="text-2xl font-black text-green-500">₹<span id="uBalance">0.00</span></h2>
            </div>
            <button onclick="toggleTheme()" class="p-3 card-ui rounded-full">🌓</button>
        </div>

        <div class="w-full h-44 md:h-80 rounded-[35px] overflow-hidden mb-8 shadow-xl relative">
            <a id="sLink" href="#"><img id="sImg" src="" style="width:100%; height:100%; object-fit:cover;"></a>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <a href="deposit.html" class="bg-green-500 text-white p-6 rounded-[30px] font-black text-center glow-green">DEPOSIT</a>
            <a href="withdraw.html" class="bg-black text-white p-6 rounded-[30px] font-black text-center shadow-lg">WITHDRAW</a>
        </div>

        <div id="miniGrid" class="grid grid-cols-4 gap-3 mb-12"></div>
    </div>

    <div onclick="toggleChat()" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl cursor-pointer z-50">💬</div>
    <div id="chatBox" class="fixed bottom-24 right-6 w-80 bg-white dark:bg-slate-800 rounded-[30px] shadow-2xl border hidden z-50 flex flex-col overflow-hidden">
        <div class="bg-green-500 p-4 text-white font-bold flex justify-between">
            <span class="text-xs uppercase" id="uMailLabel">Support</span>
            <button onclick="toggleChat()">✕</button>
        </div>
        <div id="msgBox" class="h-64 overflow-y-auto p-4 flex flex-col gap-2 bg-gray-50 dark:bg-slate-900"></div>
        <div class="p-3 border-t flex gap-2">
            <input id="chatInp" type="text" placeholder="Type..." class="w-full p-2 bg-gray-100 rounded-xl outline-none text-black">
            <button onclick="sendChat()" class="bg-green-500 text-white px-4 rounded-xl font-bold">></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userEmail = "";

        onAuthStateChanged(auth, (user) => {
            if(!user) window.location.href = "login.html";
            userEmail = user.email;
            document.getElementById('uMailLabel').innerText = userEmail;
            onValue(ref(db, 'users/' + user.uid), s => { document.getElementById('uBalance').innerText = s.val()?.balance || "0.00"; });
            loadChat();
        });

        window.toggleTheme = () => document.body.classList.toggle('dark-mode');
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');
        window.toggleChat = () => document.getElementById('chatBox').classList.toggle('hidden');

        onValue(ref(db, 'adminSettings'), s => {
            const d = s.val(); if(!d) return;
            document.getElementById('sImg').src = d.sliderImg;
            document.getElementById('sLink').href = d.sliderLink || "#";
            
            const gl = document.getElementById('miniGrid'); gl.innerHTML = "";
            if(d.miniButtons) Object.values(d.miniButtons).forEach(b => {
                gl.innerHTML += `<a href="${b.url}" class="card-ui p-2 text-center rounded-2xl"><div class="text-xl mb-1">🔘</div><span class="text-[9px] font-black uppercase truncate block w-full">${b.name}</span></a>`;
            });

            const sl = document.getElementById('sidebarLinks'); sl.innerHTML = "";
            if(d.sidebarLinks) Object.values(d.sidebarLinks).forEach(l => {
                sl.innerHTML += `<a href="${l.url}" class="block p-4 font-bold card-ui rounded-xl mb-2 hover:bg-green-500 hover:text-white transition uppercase text-[10px]">${l.name}</a>`;
            });
        });

        window.sendChat = () => {
            const val = document.getElementById('chatInp').value; if(!val) return;
            push(ref(db, `chats/${userEmail.replace(/\./g, '_')}`), { sender: userEmail, message: val, timestamp: serverTimestamp() });
            document.getElementById('chatInp').value = "";
        };

        function loadChat() {
            onValue(ref(db, `chats/${userEmail.replace(/\./g, '_')}`), s => {
                const box = document.getElementById('msgBox'); box.innerHTML = "";
                s.forEach(m => {
                    const d = m.val(); const isMe = d.sender === userEmail;
                    box.innerHTML += `<div class="${isMe ? 'self-end bg-green-500 text-white':'self-start bg-gray-200 text-black'} p-2 px-3 rounded-2xl text-[11px] font-bold max-w-[80%]">${d.message}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
