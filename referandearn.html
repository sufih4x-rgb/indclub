<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer | IND-CLUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-6">
    <div class="max-w-md mx-auto space-y-8">
        <h1 class="text-3xl font-black italic uppercase">Refer & Earn</h1>
        
        <div class="bg-slate-900 text-white p-8 rounded-[40px] shadow-2xl">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Referral Link</p>
            <p id="refLink" class="text-xs break-all mt-2 font-mono text-green-400">Loading...</p>
            <button onclick="copyLink()" class="mt-6 w-full bg-white text-black p-4 rounded-2xl font-black">COPY LINK</button>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-black text-gray-400 uppercase">Milestones</h3>
            <div id="m1" class="p-6 border rounded-[30px] flex justify-between items-center">
                <span>1 Friend Deposit</span>
                <span id="amt1" class="font-black text-green-500">₹--</span>
            </div>
            <div id="m10" class="p-6 border rounded-[30px] flex justify-between items-center">
                <span>10 Friends Deposit</span>
                <span id="amt10" class="font-black text-green-500">₹--</span>
            </div>
            <div id="m25" class="p-6 border rounded-[30px] flex justify-between items-center">
                <span>25 Friends Deposit</span>
                <span id="amt25" class="font-black text-green-500">₹--</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { /* Same Config */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Fetch Dynamic Milestone Rewards from Admin
        onValue(ref(db, 'adminSettings/referralRewards'), (snap) => {
            const r = snap.val();
            if(r) {
                document.getElementById('amt1').innerText = "₹" + r.m1;
                document.getElementById('amt10').innerText = "₹" + r.m10;
                document.getElementById('amt25').innerText = "₹" + r.m25;
            }
        });

        // Set Link
        onAuthStateChanged(auth, (u) => {
            if(u) document.getElementById('refLink').innerText = window.location.origin + "/signup.html?ref=" + u.uid;
        });

        window.copyLink = () => {
            navigator.clipboard.writeText(document.getElementById('refLink').innerText);
            alert("Copied!");
        };
    </script>
</body>
</html>
