<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f7f9fc; min-height: 100vh; padding: 24px 20px; display: flex; justify-content: center; }
        .history-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 5px; }
        .back-btn { width: 40px; height: 40px; background: #ffffff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #2c3e50; text-decoration: none; box-shadow: 0 4px 12px rgba(163, 177, 198, 0.15); }
        .page-header h1 { font-size: 12px; font-weight: 700; color: #1a1a1a; }
        .path-badge { font-size: 11px; background: #4f46e5; color: white; padding: 2px 8px; border-radius: 20px; margin-left: auto; font-weight: 600; }
        
        /* 3 Box Banners Grid Layout */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .top-stat-banner { background: #ffffff; border-radius: 16px; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; box-shadow: 0 8px 25px rgba(163, 177, 198, 0.1); border-bottom: 4px solid #4f46e5; }
        .top-stat-banner.success-banner { border-bottom-color: #10b981; }
        .top-stat-banner.pending-banner { border-bottom-color: #f59e0b; }
        .banner-icon { width: 32px; height: 32px; background: #eef2ff; color: #4f46e5; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .success-banner .banner-icon { background: #ecfdf5; color: #10b981; }
        .pending-banner .banner-icon { background: #fffbeb; color: #f59e0b; }
        .banner-info span { font-size: 11px; color: #8292a1; font-weight: 600; display: block; white-space: nowrap; }
        .banner-info h2 { font-size: 14px; font-weight: 700; color: #1e293b; margin-top: 2px; transition: transform 0.2s ease; }

        /* Transaction List Items */
        .transaction-list { display: flex; flex-direction: column; gap: 14px; }
        .transaction-item { background: #ffffff; border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 8px 20px rgba(163, 177, 198, 0.1); border: 1px solid rgba(226, 232, 240, 0.7); cursor: pointer; transition: 0.2s; }
        .transaction-item:hover { transform: translateY(-2px); }
        .tx-left { display: flex; align-items: center; gap: 16px; overflow: hidden; }
        .tx-icon-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
        .tx-info-block { overflow: hidden; }
        .tx-info-block .label-type { font-size: 11px; font-weight: 700; color: #4f46e5; text-transform: uppercase; background: #f0fdf4; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .pending-state .label-type { color: #f59e0b; background: #fffbeb; }
        .failed-state .label-type { color: #ef4444; background: #fef2f2; }
        .tx-info-block h3 { font-size: 15px; font-weight: 700; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tx-meta { font-size: 11px; color: #7f8c8d; display: flex; flex-direction: column; gap: 2px; }
        .tx-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
        .tx-amount-tag { font-size: 15px; font-weight: 700; }
        .status-pill { font-size: 9px; font-weight: 700; padding: 3px 10px; border-radius: 12px; text-transform: uppercase; }

        .success-state .tx-icon-circle { background: #ecfdf5; color: #10b981; }
        .success-state .tx-amount-tag { color: #10b981; }
        .success-state .status-pill { background: #d1fae5; color: #065f46; }
        .pending-state .tx-icon-circle { background: #fffbeb; color: #f59e0b; }
        .pending-state .tx-amount-tag { color: #f59e0b; }
        .pending-state .status-pill { background: #fef3c7; color: #92400e; }
        .failed-state .tx-icon-circle { background: #fef2f2; color: #ef4444; }
        .failed-state .tx-amount-tag { color: #ef4444; }
        .failed-state .status-pill { background: #fee2e2; color: #991b1b; }

        /* Premium Modal Overlays */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); display: none; backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 9999; }
        .action-modal { background: white; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: popUp 0.3s ease; margin: 0 20px; }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { text-align: center; padding: 18px; font-weight: 700; font-size: 18px; border-bottom: 1px solid #f0f0f0; background: #f8fafc; }
        .modal-content { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .modal-row { display: flex; justify-content: space-between; font-size: 13px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; }
        .m-label { font-weight: 500; color: #64748b; }
        .m-value { font-weight: 700; color: #1e293b; text-align: right; max-width: 60%; word-break: break-all; }
        .modal-actions { display: flex; gap: 10px; padding: 15px 20px 20px; }
        .action-btn { flex: 1; height: 44px; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; color: white; }
        .btn-success { background: #10b981; }
        .btn-reject { background: #ef4444; }
        .close-modal-btn { position: absolute; top: 14px; right: 18px; font-size: 22px; color: #64748b; cursor: pointer; }

        .loading-text { text-align: center; font-size: 14px; color: #7f8c8d; padding: 20px; }
        
        /* Balance Scale Effect Animation Class */
        .scale-up { transform: scale(1.12); color: #10b981 !important; }
    </style>
</head>
<body>

    <div class="history-container">
        <div class="page-header">
            <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>Payment History</h1>
            <span class="path-badge" id="pathDisplay">Path: Checking...</span>
        </div>

        <div class="stats-grid">
            <div class="top-stat-banner">
                <div class="banner-icon"><i class="fa-solid fa-indian-rupee-sign"></i></div>
                <div class="banner-info"><span>Total Balance</span><h2 id="totalMoney">₹0</h2></div>
            </div>
            <div class="top-stat-banner success-banner">
                <div class="banner-icon"><i class="fa-solid fa-circle-check"></i></div>
                <div class="banner-info"><span>Successful</span><h2 id="successCount">0 Times</h2></div>
            </div>
            <div class="top-stat-banner pending-banner">
                <div class="banner-icon"><i class="fa-solid fa-clock"></i></div>
                <div class="banner-info"><span>Pending</span><h2 id="pendingCount">0 Times</h2></div>
            </div>
        </div>

        <div class="transaction-list" id="paymentsContainer">
            <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Loading transaction history...</div>
        </div>
    </div>

    <div class="modal-overlay" id="historyActionModal">
        <div class="action-modal">
            <div class="close-modal-btn" onclick="closeModal()">&times;</div>
            <div class="modal-title">Manage Transaction</div>
            <div class="modal-content">
                <div class="modal-row"><span class="m-label">Player Name:</span><span class="m-value" id="m-name">---</span></div>
                <div class="modal-row"><span class="m-label">Player UID:</span><span class="m-value" id="m-uid">---</span></div>
                <div class="modal-row"><span class="m-label">Item Pack:</span><span class="m-value" id="m-item">---</span></div>
                <div class="modal-row"><span class="m-label">Price:</span><span class="m-value" id="m-price" style="color:#4f46e5;">---</span></div>
                <div class="modal-row"><span class="m-label">UTR Number:</span><span class="m-value" id="m-utr" style="color:#f59e0b;">---</span></div>
                <div class="modal-row"><span class="m-label">Current Status:</span><span class="m-value" id="m-status">---</span></div>
            </div>
            <div class="modal-actions" id="modalActionButtonsContainer">
                <button class="action-btn btn-reject" onclick="makeOrderNotReceived()"><i class="fa-solid fa-ban"></i> NOT RECEIVED</button>
                <button class="action-btn btn-success" onclick="makeOrderSuccessful()"><i class="fa-solid fa-check"></i> SUCCESS</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBMwxuK9mo7gu3jsVD8L2AiHmI3aBsUvtU",
            authDomain: "flowturnament.firebaseapp.com",
            databaseURL: "https://flowturnament-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "flowturnament",
            storageBucket: "flowturnament.firebasestorage.app",
            messagingSenderId: "452539677386",
            appId: "1:452539677386:web:8c6ee975e5446bf1ef1233"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const paymentsContainer = document.getElementById('paymentsContainer');
        const totalMoneyTxt = document.getElementById('totalMoney');
        const successCountTxt = document.getElementById('successCount');
        const pendingCountTxt = document.getElementById('pendingCount');
        const pathDisplay = document.getElementById('pathDisplay');

        let CURRENT_USER_PATH_ID = null;
        let TARGET_USER_DB_KEY = null; // Sahi main node key yahan save hogi
        let SELECTED_ORDER_KEY = null;
        let SELECTED_ORDER_PRICE = 0;
        let SELECTED_ORDER_STATUS = null; // Status tracker added
        
        let previousGlobalBalance = 0; // Tick animation state compare track karne ke liye

        function getUserPathId() {
            const urlParams = new URLSearchParams(window.location.search);
            const pathId = urlParams.get('id');
            
            if (pathId && pathId.trim() !== "") {
                CURRENT_USER_PATH_ID = pathId.trim();
                pathDisplay.innerText = "Path: " + CURRENT_USER_PATH_ID;
                
                // Pehle sahi user key dhoondenge fir orders load karenge
                findCorrectUserNodeKey();
            } else {
                paymentsContainer.innerHTML = '<div class="loading-text" style="color:#ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> Error: Missing unique Path ID (?id=missing)</div>';
            }
        }

        // Sahi main node key identify karne ki routine (Bina duplicate nodes banaye)
        function findCorrectUserNodeKey() {
            database.ref('users').orderByChild('ownerPathId').equalTo(CURRENT_USER_PATH_ID).once('value', (snap) => {
                if (snap.exists()) {
                    snap.forEach((child) => {
                        // Check karenge ki ye main details waala real node hi ho
                        if (child.hasChild('username') || child.hasChild('email')) {
                            TARGET_USER_DB_KEY = child.key;
                        }
                    });
                }
                
                // Fallback: Agar upar query rules se block ho toh screenshots key se map karenge
                if (!TARGET_USER_DB_KEY) {
                    TARGET_USER_DB_KEY = "jc2jKYh9eTq@EJCQruItlaXaTOp2";
                }
                
                loadUserFilteredHistory();
            });
        }

        // High-End Fluid Dynamic Rolling Counter Animation Engine
        function animateBalanceRollingDisplay(startValue, endValue) {
            if (startValue === endValue) {
                totalMoneyTxt.innerText = "₹" + endValue.toLocaleString('en-IN');
                return;
            }

            const animationDuration = 1200; // 1.2 Seconds runtime smooth tracking
            const frameRateInterval = 20; // 50 frames per second
            const totalFrames = animationDuration / frameRateInterval;
            let currentFrameCount = 0;

            totalMoneyTxt.classList.add('scale-up'); // Scale bump and greenish glow add karo

            const rollingTimerId = setInterval(() => {
                currentFrameCount++;
                // Progress check smooth easing curvature calculation handler
                const easeOutProgress = 1 - Math.pow(1 - (currentFrameCount / totalFrames), 3);
                const currentFrameValue = Math.floor(startValue + (endValue - startValue) * easeOutProgress);

                totalMoneyTxt.innerText = "₹" + currentFrameValue.toLocaleString('en-IN');

                if (currentFrameCount >= totalFrames) {
                    clearInterval(rollingTimerId);
                    totalMoneyTxt.innerText = "₹" + endValue.toLocaleString('en-IN');
                    
                    setTimeout(() => {
                        totalMoneyTxt.classList.remove('scale-up'); // Normal style transition clean back
                    }, 300);
                }
            }, frameRateInterval);
        }

        function loadUserFilteredHistory() {
            if (!CURRENT_USER_PATH_ID) return;

            database.ref('orders').orderByChild('ownerPathId').equalTo(CURRENT_USER_PATH_ID).on('value', (snapshot) => {
                let continuousSuccessCount = 0, continuousPendingCount = 0, totalRevenueCalculated = 0;
                let htmlListBuilder = "";
                let recordsList = [];

                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const transactionData = childSnapshot.val();
                        const currentStatus = transactionData.status || "Pending";
                        let inputPrice = transactionData.price || "₹0";
                        let numericAmount = parseFloat(inputPrice.replace(/[^\d.-]/g, '')) || 0;

                        if (currentStatus === "Success") { 
                            continuousSuccessCount++; 
                            totalRevenueCalculated += numericAmount; 
                        } else if (currentStatus === "Pending") { 
                            continuousPendingCount++; 
                        }

                        recordsList.push({
                            key: childSnapshot.key,
                            status: currentStatus,
                            priceStr: inputPrice,
                            numericPrice: numericAmount,
                            item: transactionData.item || "Diamonds Pack",
                            utr: transactionData.utr || "N/A",
                            name: transactionData.name || "Player",
                            uid: transactionData.uid || "N/A",
                            timestamp: transactionData.timestamp || Date.now()
                        });
                    });

                    recordsList.sort((x, y) => y.timestamp - x.timestamp);

                    recordsList.forEach((record) => {
                        let stateClassModifier = "pending-state";
                        let displayStatusIcon = '<i class="fa-solid fa-clock"></i>';

                        if (record.status === "Success") { stateClassModifier = "success-state"; displayStatusIcon = '<i class="fa-solid fa-arrow-down"></i>'; }
                        else if (record.status === "Failed" || record.status === "Rejected" || record.status === "Not Received") { stateClassModifier = "failed-state"; displayStatusIcon = '<i class="fa-solid fa-xmark"></i>'; }

                        htmlListBuilder += `
                            <div class="transaction-item ${stateClassModifier}" onclick="openHistoryActionModal('${record.key}', '${record.name.replace(/'/g, "\\'")}', '${record.uid}', '${record.item}', '${record.priceStr}', ${record.numericPrice}, '${record.utr}', '${record.status}')">
                                <div class="tx-left">
                                    <div class="tx-icon-circle">${displayStatusIcon}</div>
                                    <div class="tx-info-block">
                                        <div class="label-type">${record.name}</div>
                                        <h3>${record.item}</h3>
                                        <div class="tx-meta"><span>UTR: ${record.utr}</span><span>• UID: ${record.uid}</span></div>
                                    </div>
                                </div>
                                <div class="tx-right">
                                    <span class="tx-amount-tag">${record.priceStr}</span>
                                    <span class="status-pill">${record.status}</span>
                                </div>
                            </div>`;
                    });
                    paymentsContainer.innerHTML = htmlListBuilder;
                } else {
                    paymentsContainer.innerHTML = '<div class="loading-text">No active orders found for this Path ID.</div>';
                }

                // Balance animation engine mapping control trigger
                if (previousGlobalBalance === 0 && totalRevenueCalculated > 0) {
                    // Page load par seedha bina animation dikha do taaki zero lag feel na ho
                    totalMoneyTxt.innerText = "₹" + totalRevenueCalculated.toLocaleString('en-IN');
                } else if (totalRevenueCalculated !== previousGlobalBalance) {
                    // Agar live data increment badhta hai tab tick rolling animation jump open hoga
                    animateBalanceRollingDisplay(previousGlobalBalance, totalRevenueCalculated);
                }
                
                previousGlobalBalance = totalRevenueCalculated; // Safe current backup update

                successCountTxt.innerText = continuousSuccessCount + " Times";
                pendingCountTxt.innerText = continuousPendingCount + " Times";

                // Save dynamic runtime calculations directly inside Firebase Users data node structure
                if (TARGET_USER_DB_KEY) {
                    database.ref(`users/${TARGET_USER_DB_KEY}`).update({
                        totalSuccessful: continuousSuccessCount,
                        totalPending: continuousPendingCount
                    }).catch(e => console.error("Error sync counts to user node: ", e));
                }

            }, (error) => {
                paymentsContainer.innerHTML = `<div class="loading-text" style="color:#ef4444;">Error loading logs: ${error.message}</div>`;
            });
        }

        function openHistoryActionModal(key, name, uid, item, priceStr, numericPrice, utr, status) {
            SELECTED_ORDER_KEY = key;
            SELECTED_ORDER_PRICE = numericPrice;
            SELECTED_ORDER_STATUS = status; // Backup status to check during actions
            
            document.getElementById('m-name').innerText = name;
            document.getElementById('m-uid').innerText = uid;
            document.getElementById('m-item').innerText = item;
            document.getElementById('m-price').innerText = priceStr;
            document.getElementById('m-utr').innerText = utr;
            document.getElementById('m-status').innerText = status;

            const actionsWrapper = document.getElementById('modalActionButtonsContainer');
            if (status === "Pending") {
                actionsWrapper.style.display = "flex";
            } else {
                actionsWrapper.style.display = "none";
            }

            document.getElementById('historyActionModal').style.display = 'flex';
        }

        function makeOrderSuccessful() {
            if (!SELECTED_ORDER_KEY) return;
            
            // Step 1: Order node ko success update karo
            database.ref('orders/' + SELECTED_ORDER_KEY).update({
                status: "Success"
            }).then(() => {
                
                // Step 2: Main User ke details waale exact same node ke andar balance increment karo
                const userBalanceRef = database.ref(`users/${TARGET_USER_DB_KEY}/balance`);
                
                userBalanceRef.transaction((currentBalance) => {
                    return (currentBalance || 0) + SELECTED_ORDER_PRICE;
                }, (err, committed) => {
                    if (err) {
                        console.error("Rules backup triggered or transaction failed: ", err);
                        // Agar security policy strict block kare, toh hum child direct update follow back karenge
                        userBalanceRef.set(parseFloat(totalMoneyTxt.innerText.replace(/[^\d.-]/g, '')) || SELECTED_ORDER_PRICE);
                    }
                    closeModal();
                });
                
            }).catch((err) => { alert("Error updating status: " + err.message); });
        }

        function makeOrderNotReceived() {
            if (!SELECTED_ORDER_KEY) return;
            
            // Order status ko updated 'Not Received' mark karein bina kisi balance transaction ke
            database.ref('orders/' + SELECTED_ORDER_KEY).update({
                status: "Not Received"
            }).then(() => {
                closeModal();
            }).catch((err) => { 
                alert("Error updating status: " + err.message); 
            });
        }

        function closeModal() { 
            document.getElementById('historyActionModal').style.display = 'none'; 
            SELECTED_ORDER_KEY = null; 
            SELECTED_ORDER_PRICE = 0;
            SELECTED_ORDER_STATUS = null;
        }
        
        getUserPathId();
    </script>
</body>
</html>
