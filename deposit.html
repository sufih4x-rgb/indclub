<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit | IND-CLUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .glow-btn { box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4); border: 2px solid #22c55e; }
        .qr-card { border: 2px dashed #cbd5e1; border-radius: 30px; background: #fff; }
    </style>
</head>
<body class="bg-white p-6">
    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-3xl font-black italic uppercase">Add Cash</h1>

        <input type="number" id="amt" placeholder="Enter Amount" class="w-full p-6 bg-gray-50 rounded-[30px] text-2xl font-black outline-none" oninput="showQR()">

        <div id="qrArea" class="qr-card p-8 flex flex-col items-center hidden">
            <div id="qrcode"></div>
            <p class="mt-4 text-[10px] font-black text-gray-400 uppercase">Send to: <span id="targetUpi" class="text-green-600">...</span></p>
        </div>

        <input type="text" id="utr" maxlength="12" placeholder="Enter 12-Digit UTR" class="w-full p-6 bg-gray-50 rounded-[30px] font-black text-center tracking-widest outline-none">

        <button onclick="submitDepo()" class="w-full bg-white text-green-500 p-6 rounded-[30px] font-black text-xl glow-btn transition active:scale-95">SUBMIT PAYMENT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc1CIlHGlYg1YDSei59ofAac4g3zcGlgA",
            authDomain: "ind-club-v1.firebaseapp.com",
            databaseURL: "https://ind-club-v1-default-rtdb.firebaseio.com",
            projectId: "ind-club-v1",
            storageBucket: "ind-club-v1.appspot.com",
            messagingSenderId: "1043970059809",
            appId: "1:1043970059809:web:f730b857ca3a76c061fd60"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let upis = [];
        let chosenUpi = "";

        onValue(ref(db, 'adminSettings/upis'), (snap) => {
            upis = []; snap.forEach(c => upis.push(c.val().upi));
            chosenUpi = upis[Math.floor(Math.random() * upis.length)];
            document.getElementById('targetUpi').innerText = chosenUpi;
        });

        window.showQR = () => {
            const a = document.getElementById('amt').value;
            const area = document.getElementById('qrArea');
            if(a >= 10 && chosenUpi) {
                area.classList.remove('hidden');
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: `upi://pay?pa=${chosenUpi}&am=${a}&cu=INR`, width: 180, height: 180 });
            } else { area.classList.add('hidden'); }
        };

        window.submitDepo = async () => {
            const u = document.getElementById('utr').value;
            const a = document.getElementById('amt').value;
            if(u.length !== 12) return alert("Enter valid 12-digit UTR!");
            
            await push(ref(db, 'pendingDeposits'), {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                amount: a,
                utr: u,
                status: 'pending'
            });
            alert("Request Sent!");
            location.reload();
        };

        // Success Popup Check
        onAuthStateChanged(auth, (user) => {
            if(user) {
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    if(snap.val()?.lastStatus === 'approved') {
                        alert("Your last deposit was added in your balance ✅");
                        set(ref(db, `users/${user.uid}/lastStatus`), 'notified');
                    }
                });
            }
        });
    </script>
</body>
</html>
